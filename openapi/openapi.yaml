openapi: 3.0.3
info:
  title: Awniq API
  version: 0.5.0
  description: API contract snapshot for the identity, case-management, finance, and inventory foundations.
servers:
  - url: http://localhost:8000/api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Check API health
      tags: [System]
      security: []
      responses:
        "200":
          description: API health status
  /auth/login:
    post:
      summary: Create a Sanctum API token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and bearer token
  /auth/me:
    get:
      summary: Get the authenticated user profile
      tags: [Auth]
      responses:
        "200":
          description: Current user
  /auth/logout:
    post:
      summary: Revoke the current API token
      tags: [Auth]
      responses:
        "200":
          description: Token revoked
  /organization:
    get:
      summary: Get current organization
      tags: [Identity]
      responses:
        "200":
          description: Organization profile
    patch:
      summary: Update current organization
      tags: [Identity]
      responses:
        "200":
          description: Updated organization profile
  /branches:
    get:
      summary: List organization branches
      tags: [Identity]
      responses:
        "200":
          description: Branch collection
    post:
      summary: Create a branch
      tags: [Identity]
      responses:
        "200":
          description: Created branch
  /users:
    get:
      summary: List organization users
      tags: [Identity]
      responses:
        "200":
          description: User collection
    post:
      summary: Create an organization user
      tags: [Identity]
      responses:
        "200":
          description: Created user
  /roles:
    get:
      summary: List roles
      tags: [Identity]
      responses:
        "200":
          description: Role collection
  /permissions:
    get:
      summary: List permissions
      tags: [Identity]
      responses:
        "200":
          description: Permission collection
  /audit-logs:
    get:
      summary: List audit log entries
      tags: [Audit]
      responses:
        "200":
          description: Audit log collection
  /beneficiaries:
    get:
      summary: List beneficiaries
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: branch_id
          in: query
          schema:
            type: integer
        - name: vulnerability_level
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        "200":
          description: Beneficiary collection
    post:
      summary: Create a beneficiary
      tags: [Beneficiaries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeneficiaryRequest"
      responses:
        "200":
          description: Created beneficiary
  /beneficiaries/{beneficiary}:
    get:
      summary: Get a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Beneficiary detail
    patch:
      summary: Update a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Updated beneficiary
    delete:
      summary: Delete a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Deleted beneficiary
  /beneficiaries/{beneficiary}/submit-review:
    post:
      summary: Submit a beneficiary for review
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Beneficiary marked pending review
  /beneficiaries/{beneficiary}/approve:
    post:
      summary: Approve a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Beneficiary approved
  /beneficiaries/{beneficiary}/reject:
    post:
      summary: Reject a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionReasonRequest"
      responses:
        "200":
          description: Beneficiary rejected
  /beneficiaries/{beneficiary}/family-members:
    get:
      summary: List beneficiary family members
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Family member collection
    post:
      summary: Create a beneficiary family member
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyMemberRequest"
      responses:
        "200":
          description: Created family member
  /case-files:
    get:
      summary: List case files
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
      responses:
        "200":
          description: Case file collection
    post:
      summary: Create a case file
      tags: [Case Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseFileRequest"
      responses:
        "200":
          description: Created case file
  /case-files/{caseFile}:
    get:
      summary: Get a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case file detail
    patch:
      summary: Update a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Updated case file
    delete:
      summary: Delete a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Deleted case file
  /case-files/{caseFile}/submit-review:
    post:
      summary: Submit a case file for review
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case file marked under review
  /case-files/{caseFile}/approve:
    post:
      summary: Approve a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case file approved
  /case-files/{caseFile}/reject:
    post:
      summary: Reject a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionReasonRequest"
      responses:
        "200":
          description: Case file rejected
  /case-files/{caseFile}/notes:
    get:
      summary: List case notes
      tags: [Case Notes]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case note collection
    post:
      summary: Create a case note
      tags: [Case Notes]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseNoteRequest"
      responses:
        "200":
          description: Created case note
  /case-files/{caseFile}/documents:
    get:
      summary: List case documents
      tags: [Case Documents]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case document collection
    post:
      summary: Upload a case document
      tags: [Case Documents]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CaseDocumentUploadRequest"
      responses:
        "200":
          description: Uploaded case document
  /donors:
    get:
      summary: List donors
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Donor collection
    post:
      summary: Create a donor
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonorRequest"
      responses:
        "200":
          description: Created donor
  /donors/{donor}/donations:
    get:
      summary: List donor donation history
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonorId"
      responses:
        "200":
          description: Donor donation collection
  /campaigns:
    get:
      summary: List campaigns
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Campaign collection
    post:
      summary: Create a campaign
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignRequest"
      responses:
        "200":
          description: Created campaign
  /campaigns/{campaign}/activate:
    post:
      summary: Activate a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign activated
  /campaigns/{campaign}/pause:
    post:
      summary: Pause a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign paused
  /campaigns/{campaign}/complete:
    post:
      summary: Complete a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign completed
  /campaigns/{campaign}/cancel:
    post:
      summary: Cancel a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign cancelled
  /donations:
    get:
      summary: List donations
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/Search"
        - name: payment_status
          in: query
          schema:
            type: string
        - name: donation_status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Donation collection
    post:
      summary: Create a donation with optional allocations
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonationRequest"
      responses:
        "200":
          description: Created donation
  /donations/{donation}/confirm:
    post:
      summary: Confirm manual payment for a donation
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmDonationRequest"
      responses:
        "200":
          description: Confirmed donation with payment transaction and receipt
  /donations/{donation}/allocations:
    get:
      summary: List donation allocations
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Allocation collection
    post:
      summary: Create a donation allocation
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonationAllocationRequest"
      responses:
        "200":
          description: Created allocation
  /donations/{donation}/receipt:
    get:
      summary: Get a donation receipt
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Receipt detail
    post:
      summary: Generate a receipt for a confirmed donation
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Generated receipt
  /donations/{donation}/payment-transactions:
    get:
      summary: List donation payment transactions
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Payment transaction collection
  /payment-transactions/{paymentTransaction}:
    get:
      summary: Get a payment transaction
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/PaymentTransactionId"
      responses:
        "200":
          description: Payment transaction detail
  /warehouses:
    get:
      summary: List warehouses
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: branch_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Warehouse collection
    post:
      summary: Create a warehouse
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseRequest"
      responses:
        "200":
          description: Created warehouse
  /warehouses/{warehouse}:
    get:
      summary: Get a warehouse
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/WarehouseId"
      responses:
        "200":
          description: Warehouse detail
    patch:
      summary: Update a warehouse
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/WarehouseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseRequest"
      responses:
        "200":
          description: Updated warehouse
    delete:
      summary: Delete an empty warehouse
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/WarehouseId"
      responses:
        "200":
          description: Deleted warehouse
  /inventory-items:
    get:
      summary: List inventory items
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: category
          in: query
          schema:
            type: string
        - name: track_expiry
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory item collection
    post:
      summary: Create an inventory item
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemRequest"
      responses:
        "200":
          description: Created inventory item
  /inventory-items/{inventoryItem}:
    get:
      summary: Get an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Inventory item detail
    patch:
      summary: Update an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemRequest"
      responses:
        "200":
          description: Updated inventory item
    delete:
      summary: Delete an inventory item without stock history
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Deleted inventory item
  /inventory-items/{inventoryItem}/stock:
    get:
      summary: Get stock summary for an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
        - name: warehouse_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item stock summary
  /inventory-items/{inventoryItem}/movements:
    get:
      summary: List stock movements for an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Stock movement collection
  /stock/lots:
    get:
      summary: List stock lots
      tags: [Inventory]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
        - name: inventory_item_id
          in: query
          schema:
            type: integer
        - name: available_only
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Stock lot collection
    post:
      summary: Receive stock and create a stock lot
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveStockRequest"
      responses:
        "200":
          description: Created stock lot
  /stock/lots/{stockLot}:
    get:
      summary: Get a stock lot
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/StockLotId"
      responses:
        "200":
          description: Stock lot detail
  /stock/movements:
    get:
      summary: List stock movements
      tags: [Inventory]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
        - name: inventory_item_id
          in: query
          schema:
            type: integer
        - name: movement_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Stock movement collection
  /stock/movements/receive:
    post:
      summary: Receive stock and record a stock-in movement
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveStockRequest"
      responses:
        "200":
          description: Created stock lot
  /stock/movements/adjust:
    post:
      summary: Record a stock adjustment
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustStockRequest"
      responses:
        "200":
          description: Created stock movement
  /stock/movements/{stockMovement}:
    get:
      summary: Get a stock movement
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/StockMovementId"
      responses:
        "200":
          description: Stock movement detail
  /stock/summary:
    get:
      summary: List available and reserved stock by item
      tags: [Inventory]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Stock summary rows
  /stock/low-stock:
    get:
      summary: List inventory items at or below minimum stock
      tags: [Inventory]
      responses:
        "200":
          description: Low stock rows
  /stock/expiring:
    get:
      summary: List lots expiring within a date window
      tags: [Inventory]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
      responses:
        "200":
          description: Expiring stock lots
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    Search:
      name: search
      in: query
      schema:
        type: string
    Status:
      name: status
      in: query
      schema:
        type: string
    BeneficiaryId:
      name: beneficiary
      in: path
      required: true
      schema:
        type: integer
    CaseFileId:
      name: caseFile
      in: path
      required: true
      schema:
        type: integer
    DonorId:
      name: donor
      in: path
      required: true
      schema:
        type: integer
    CampaignId:
      name: campaign
      in: path
      required: true
      schema:
        type: integer
    DonationId:
      name: donation
      in: path
      required: true
      schema:
        type: integer
    PaymentTransactionId:
      name: paymentTransaction
      in: path
      required: true
      schema:
        type: integer
    WarehouseId:
      name: warehouse
      in: path
      required: true
      schema:
        type: integer
    InventoryItemId:
      name: inventoryItem
      in: path
      required: true
      schema:
        type: integer
    StockLotId:
      name: stockLot
      in: path
      required: true
      schema:
        type: integer
    StockMovementId:
      name: stockMovement
      in: path
      required: true
      schema:
        type: integer
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@awniq.test
        password:
          type: string
          example: Password123!
        device_name:
          type: string
          example: manual
    BeneficiaryRequest:
      type: object
      required: [branch_id, full_name]
      properties:
        branch_id:
          type: integer
        full_name:
          type: string
        national_id:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [male, female, other, unknown]
        phone:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        household_size:
          type: integer
          minimum: 1
        vulnerability_level:
          type: string
          enum: [low, medium, high, critical]
    FamilyMemberRequest:
      type: object
      required: [full_name, relationship]
      properties:
        full_name:
          type: string
        relationship:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [male, female, other, unknown]
    CaseFileRequest:
      type: object
      required: [beneficiary_id, case_type]
      properties:
        beneficiary_id:
          type: integer
        case_type:
          type: string
          example: monthly_food_support
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assigned_to_user_id:
          type: integer
          nullable: true
        assessment_summary:
          type: string
          nullable: true
        next_follow_up_date:
          type: string
          format: date
          nullable: true
    CaseNoteRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
        visibility:
          type: string
          enum: [internal, private, public]
    CaseDocumentUploadRequest:
      type: object
      required: [document_type, file]
      properties:
        document_type:
          type: string
          enum: [identity, proof_of_address, medical_report, income_proof, assessment, consent, other]
        file:
          type: string
          format: binary
    DonorRequest:
      type: object
      required: [donor_type, name]
      properties:
        donor_type:
          type: string
          enum: [individual, company, institution, anonymous]
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, blocked]
    CampaignRequest:
      type: object
      required: [title, slug, goal_amount, currency, start_date]
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        goal_amount:
          type: number
        currency:
          type: string
          example: EGP
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        visibility:
          type: string
          enum: [private, public]
    DonationAllocationRequest:
      type: object
      required: [allocation_type, amount]
      properties:
        allocation_type:
          type: string
          enum: [general_fund, campaign, beneficiary, case_file, medical, education, food, emergency, inventory, other]
        campaign_id:
          type: integer
          nullable: true
        beneficiary_id:
          type: integer
          nullable: true
        case_file_id:
          type: integer
          nullable: true
        amount:
          type: number
        notes:
          type: string
          nullable: true
    DonationRequest:
      type: object
      required: [amount, currency, payment_method, donated_at]
      properties:
        donor_id:
          type: integer
          nullable: true
        campaign_id:
          type: integer
          nullable: true
        amount:
          type: number
        currency:
          type: string
          example: EGP
        payment_method:
          type: string
          enum: [cash, bank_transfer, card, check, mobile_wallet, other]
        donated_at:
          type: string
          format: date-time
        allocations:
          type: array
          items:
            $ref: "#/components/schemas/DonationAllocationRequest"
    ConfirmDonationRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [manual, fake]
        provider_transaction_id:
          type: string
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
    WarehouseRequest:
      type: object
      required: [name, code]
      properties:
        branch_id:
          type: integer
          nullable: true
        name:
          type: string
        code:
          type: string
          example: CAI-MAIN
        address:
          type: string
          nullable: true
        manager_user_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, inactive]
    InventoryItemRequest:
      type: object
      required: [sku, name, category, unit]
      properties:
        sku:
          type: string
          example: FOOD-RICE-5KG
        name:
          type: string
        category:
          type: string
          example: food
        unit:
          type: string
          example: bag
        description:
          type: string
          nullable: true
        minimum_stock_level:
          type: number
          minimum: 0
        track_expiry:
          type: boolean
        status:
          type: string
          enum: [active, inactive]
    ReceiveStockRequest:
      type: object
      required: [warehouse_id, inventory_item_id, quantity, source_type, received_at]
      properties:
        warehouse_id:
          type: integer
        inventory_item_id:
          type: integer
        quantity:
          type: number
          minimum: 0
        source_type:
          type: string
          enum: [opening_balance, purchase, donation_in_kind, transfer, adjustment, other]
        source_id:
          type: integer
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        received_at:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
    AdjustStockRequest:
      type: object
      required: [warehouse_id, inventory_item_id, movement_type, quantity, notes]
      properties:
        warehouse_id:
          type: integer
        inventory_item_id:
          type: integer
        stock_lot_id:
          type: integer
          nullable: true
        movement_type:
          type: string
          enum: [adjustment_in, adjustment_out, damaged, expired]
        quantity:
          type: number
          minimum: 0
        expiry_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
    RejectionReasonRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
