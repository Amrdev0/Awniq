openapi: 3.0.3
info:
  title: Awniq API
  version: 0.10.0
  description: API contract snapshot for the identity, case-management, finance, inventory, aid distribution, reporting, public transparency, notification automation, and release-readiness foundations.
servers:
  - url: http://localhost:8000/api/v1
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Check API health
      tags: [System]
      security: []
      responses:
        "200":
          description: API health status
  /version:
    get:
      summary: Get API release metadata
      tags: [System]
      security: []
      responses:
        "200":
          description: API service, version, commit, and environment metadata
  /public/organization:
    get:
      summary: Get public organization profile
      tags: [Public Portal]
      security: []
      parameters:
        - name: organization
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Public-safe organization profile
        "404":
          description: Public portal is disabled or organization was not found
  /public/campaigns:
    get:
      summary: List public campaigns
      tags: [Public Portal]
      security: []
      parameters:
        - name: organization
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Public campaign collection
  /public/campaigns/{slug}:
    get:
      summary: Get public campaign by slug
      tags: [Public Portal]
      security: []
      parameters:
        - $ref: "#/components/parameters/PublicCampaignSlug"
        - name: organization
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Public campaign detail
        "404":
          description: Campaign is not public or was not found
  /public/stats:
    get:
      summary: Get aggregate public impact statistics
      tags: [Public Portal]
      security: []
      parameters:
        - name: organization
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Public aggregate statistics
  /public/reports:
    get:
      summary: Get public report snapshot when enabled
      tags: [Public Portal]
      security: []
      parameters:
        - name: organization
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Public report snapshot
        "404":
          description: Public reports are disabled
  /public/donations:
    post:
      summary: Create a public donation intent placeholder
      tags: [Public Portal]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublicDonationIntentRequest"
      responses:
        "201":
          description: Donation intent recorded
        "403":
          description: Public donations are disabled
  /auth/login:
    post:
      summary: Create a Sanctum API token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and bearer token
  /auth/me:
    get:
      summary: Get the authenticated user profile
      tags: [Auth]
      responses:
        "200":
          description: Current user
  /auth/logout:
    post:
      summary: Revoke the current API token
      tags: [Auth]
      responses:
        "200":
          description: Token revoked
  /notifications:
    get:
      summary: List current user's notifications
      tags: [Notifications]
      parameters:
        - name: unread
          in: query
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            type: string
            enum: [cases, finance, inventory, aid_distribution, system]
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, success, warning, critical]
      responses:
        "200":
          description: Notification collection
  /notifications/unread-count:
    get:
      summary: Get current user's unread notification count
      tags: [Notifications]
      responses:
        "200":
          description: Unread notification count
  /notifications/{notification}/mark-read:
    post:
      summary: Mark one notification as read
      tags: [Notifications]
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200":
          description: Updated notification
        "404":
          description: Notification does not belong to current user
  /notifications/mark-all-read:
    post:
      summary: Mark all current user's notifications as read
      tags: [Notifications]
      responses:
        "200":
          description: Notifications marked read
  /notification-preferences:
    get:
      summary: List current user's notification preferences
      tags: [Notifications]
      responses:
        "200":
          description: Notification preference collection
    patch:
      summary: Update current user's notification preferences
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferencesRequest"
      responses:
        "200":
          description: Updated notification preference collection
  /system/scheduled-jobs:
    get:
      summary: List configured scheduled jobs
      tags: [System]
      responses:
        "200":
          description: Scheduled job metadata
  /system/queue-health:
    get:
      summary: Get queue health counts
      tags: [System]
      responses:
        "200":
          description: Queue connection and job counts
  /organization:
    get:
      summary: Get current organization
      tags: [Identity]
      responses:
        "200":
          description: Organization profile
    patch:
      summary: Update current organization
      tags: [Identity]
      responses:
        "200":
          description: Updated organization profile
  /settings/public-portal:
    get:
      summary: Get public portal settings
      tags: [Public Portal Settings]
      responses:
        "200":
          description: Public portal settings
    patch:
      summary: Update public portal settings
      tags: [Public Portal Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePublicPortalSettingsRequest"
      responses:
        "200":
          description: Updated public portal settings
  /branches:
    get:
      summary: List organization branches
      tags: [Identity]
      responses:
        "200":
          description: Branch collection
    post:
      summary: Create a branch
      tags: [Identity]
      responses:
        "200":
          description: Created branch
  /users:
    get:
      summary: List organization users
      tags: [Identity]
      responses:
        "200":
          description: User collection
    post:
      summary: Create an organization user
      tags: [Identity]
      responses:
        "200":
          description: Created user
  /roles:
    get:
      summary: List roles
      tags: [Identity]
      responses:
        "200":
          description: Role collection
  /permissions:
    get:
      summary: List permissions
      tags: [Identity]
      responses:
        "200":
          description: Permission collection
  /audit-logs:
    get:
      summary: List audit log entries
      tags: [Audit]
      responses:
        "200":
          description: Audit log collection
  /beneficiaries:
    get:
      summary: List beneficiaries
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: branch_id
          in: query
          schema:
            type: integer
        - name: vulnerability_level
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
      responses:
        "200":
          description: Beneficiary collection
    post:
      summary: Create a beneficiary
      tags: [Beneficiaries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeneficiaryRequest"
      responses:
        "200":
          description: Created beneficiary
  /beneficiaries/{beneficiary}:
    get:
      summary: Get a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Beneficiary detail
    patch:
      summary: Update a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Updated beneficiary
    delete:
      summary: Delete a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Deleted beneficiary
  /beneficiaries/{beneficiary}/submit-review:
    post:
      summary: Submit a beneficiary for review
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Beneficiary marked pending review
  /beneficiaries/{beneficiary}/approve:
    post:
      summary: Approve a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Beneficiary approved
  /beneficiaries/{beneficiary}/reject:
    post:
      summary: Reject a beneficiary
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionReasonRequest"
      responses:
        "200":
          description: Beneficiary rejected
  /beneficiaries/{beneficiary}/family-members:
    get:
      summary: List beneficiary family members
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      responses:
        "200":
          description: Family member collection
    post:
      summary: Create a beneficiary family member
      tags: [Beneficiaries]
      parameters:
        - $ref: "#/components/parameters/BeneficiaryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyMemberRequest"
      responses:
        "200":
          description: Created family member
  /case-files:
    get:
      summary: List case files
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
      responses:
        "200":
          description: Case file collection
    post:
      summary: Create a case file
      tags: [Case Files]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseFileRequest"
      responses:
        "200":
          description: Created case file
  /case-files/{caseFile}:
    get:
      summary: Get a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case file detail
    patch:
      summary: Update a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Updated case file
    delete:
      summary: Delete a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Deleted case file
  /case-files/{caseFile}/submit-review:
    post:
      summary: Submit a case file for review
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case file marked under review
  /case-files/{caseFile}/approve:
    post:
      summary: Approve a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case file approved
  /case-files/{caseFile}/reject:
    post:
      summary: Reject a case file
      tags: [Case Files]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionReasonRequest"
      responses:
        "200":
          description: Case file rejected
  /case-files/{caseFile}/notes:
    get:
      summary: List case notes
      tags: [Case Notes]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case note collection
    post:
      summary: Create a case note
      tags: [Case Notes]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseNoteRequest"
      responses:
        "200":
          description: Created case note
  /case-files/{caseFile}/documents:
    get:
      summary: List case documents
      tags: [Case Documents]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      responses:
        "200":
          description: Case document collection
    post:
      summary: Upload a case document
      tags: [Case Documents]
      parameters:
        - $ref: "#/components/parameters/CaseFileId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CaseDocumentUploadRequest"
      responses:
        "200":
          description: Uploaded case document
  /donors:
    get:
      summary: List donors
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Donor collection
    post:
      summary: Create a donor
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonorRequest"
      responses:
        "200":
          description: Created donor
  /donors/{donor}/donations:
    get:
      summary: List donor donation history
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonorId"
      responses:
        "200":
          description: Donor donation collection
  /campaigns:
    get:
      summary: List campaigns
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Campaign collection
    post:
      summary: Create a campaign
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignRequest"
      responses:
        "200":
          description: Created campaign
  /campaigns/{campaign}/activate:
    post:
      summary: Activate a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign activated
  /campaigns/{campaign}/pause:
    post:
      summary: Pause a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign paused
  /campaigns/{campaign}/complete:
    post:
      summary: Complete a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign completed
  /campaigns/{campaign}/cancel:
    post:
      summary: Cancel a campaign
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Campaign cancelled
  /donations:
    get:
      summary: List donations
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/Search"
        - name: payment_status
          in: query
          schema:
            type: string
        - name: donation_status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Donation collection
    post:
      summary: Create a donation with optional allocations
      tags: [Finance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonationRequest"
      responses:
        "200":
          description: Created donation
  /donations/{donation}/confirm:
    post:
      summary: Confirm manual payment for a donation
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmDonationRequest"
      responses:
        "200":
          description: Confirmed donation with payment transaction and receipt
  /donations/{donation}/allocations:
    get:
      summary: List donation allocations
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Allocation collection
    post:
      summary: Create a donation allocation
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonationAllocationRequest"
      responses:
        "200":
          description: Created allocation
  /donations/{donation}/receipt:
    get:
      summary: Get a donation receipt
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Receipt detail
    post:
      summary: Generate a receipt for a confirmed donation
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Generated receipt
  /donations/{donation}/payment-transactions:
    get:
      summary: List donation payment transactions
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/DonationId"
      responses:
        "200":
          description: Payment transaction collection
  /payment-transactions/{paymentTransaction}:
    get:
      summary: Get a payment transaction
      tags: [Finance]
      parameters:
        - $ref: "#/components/parameters/PaymentTransactionId"
      responses:
        "200":
          description: Payment transaction detail
  /warehouses:
    get:
      summary: List warehouses
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: branch_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Warehouse collection
    post:
      summary: Create a warehouse
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseRequest"
      responses:
        "200":
          description: Created warehouse
  /warehouses/{warehouse}:
    get:
      summary: Get a warehouse
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/WarehouseId"
      responses:
        "200":
          description: Warehouse detail
    patch:
      summary: Update a warehouse
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/WarehouseId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarehouseRequest"
      responses:
        "200":
          description: Updated warehouse
    delete:
      summary: Delete an empty warehouse
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/WarehouseId"
      responses:
        "200":
          description: Deleted warehouse
  /inventory-items:
    get:
      summary: List inventory items
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
        - name: category
          in: query
          schema:
            type: string
        - name: track_expiry
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Inventory item collection
    post:
      summary: Create an inventory item
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemRequest"
      responses:
        "200":
          description: Created inventory item
  /inventory-items/{inventoryItem}:
    get:
      summary: Get an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Inventory item detail
    patch:
      summary: Update an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemRequest"
      responses:
        "200":
          description: Updated inventory item
    delete:
      summary: Delete an inventory item without stock history
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Deleted inventory item
  /inventory-items/{inventoryItem}/stock:
    get:
      summary: Get stock summary for an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
        - name: warehouse_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item stock summary
  /inventory-items/{inventoryItem}/movements:
    get:
      summary: List stock movements for an inventory item
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/InventoryItemId"
      responses:
        "200":
          description: Stock movement collection
  /stock/lots:
    get:
      summary: List stock lots
      tags: [Inventory]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
        - name: inventory_item_id
          in: query
          schema:
            type: integer
        - name: available_only
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Stock lot collection
    post:
      summary: Receive stock and create a stock lot
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveStockRequest"
      responses:
        "200":
          description: Created stock lot
  /stock/lots/{stockLot}:
    get:
      summary: Get a stock lot
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/StockLotId"
      responses:
        "200":
          description: Stock lot detail
  /stock/movements:
    get:
      summary: List stock movements
      tags: [Inventory]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
        - name: inventory_item_id
          in: query
          schema:
            type: integer
        - name: movement_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Stock movement collection
  /stock/movements/receive:
    post:
      summary: Receive stock and record a stock-in movement
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveStockRequest"
      responses:
        "200":
          description: Created stock lot
  /stock/movements/adjust:
    post:
      summary: Record a stock adjustment
      tags: [Inventory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustStockRequest"
      responses:
        "200":
          description: Created stock movement
  /stock/movements/{stockMovement}:
    get:
      summary: Get a stock movement
      tags: [Inventory]
      parameters:
        - $ref: "#/components/parameters/StockMovementId"
      responses:
        "200":
          description: Stock movement detail
  /stock/summary:
    get:
      summary: List available and reserved stock by item
      tags: [Inventory]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Stock summary rows
  /stock/low-stock:
    get:
      summary: List inventory items at or below minimum stock
      tags: [Inventory]
      responses:
        "200":
          description: Low stock rows
  /stock/expiring:
    get:
      summary: List lots expiring within a date window
      tags: [Inventory]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
      responses:
        "200":
          description: Expiring stock lots
  /aid-batches:
    get:
      summary: List aid batches
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Aid batch collection
    post:
      summary: Create an aid batch
      tags: [Aid Distribution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AidBatchRequest"
      responses:
        "200":
          description: Created aid batch
  /aid-batches/{aidBatch}:
    get:
      summary: Get an aid batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Aid batch detail
    patch:
      summary: Update a draft or pending aid batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AidBatchRequest"
      responses:
        "200":
          description: Updated aid batch
    delete:
      summary: Delete a draft aid batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Deleted aid batch
  /aid-batches/{aidBatch}/submit-approval:
    post:
      summary: Submit a draft batch for approval
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Batch submitted for approval
  /aid-batches/{aidBatch}/approve:
    post:
      summary: Approve a batch and reserve stock
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Approved batch with stock reservations
  /aid-batches/{aidBatch}/cancel:
    post:
      summary: Cancel a batch and release reservations
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Cancelled aid batch
  /aid-batches/{aidBatch}/complete:
    post:
      summary: Complete a batch when all distributions are terminal
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Completed aid batch
  /aid-batches/{aidBatch}/eligible-beneficiaries:
    get:
      summary: List eligible beneficiaries for a batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
        - $ref: "#/components/parameters/Search"
      responses:
        "200":
          description: Approved beneficiary collection
  /aid-batches/{aidBatch}/stock-check:
    get:
      summary: Check required versus available stock for a batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Stock sufficiency rows
  /aid-batches/{aidBatch}/distributions:
    get:
      summary: List distributions in a batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      responses:
        "200":
          description: Distribution collection
    post:
      summary: Add a distribution to a batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AidDistributionRequest"
      responses:
        "200":
          description: Created distribution
  /aid-batches/{aidBatch}/distributions/{distribution}:
    patch:
      summary: Update a distribution in a mutable batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
        - $ref: "#/components/parameters/AidDistributionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AidDistributionRequest"
      responses:
        "200":
          description: Updated distribution
    delete:
      summary: Delete a distribution from a mutable batch
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidBatchId"
        - $ref: "#/components/parameters/AidDistributionId"
      responses:
        "200":
          description: Deleted distribution
  /aid-distributions/{distribution}:
    get:
      summary: Get a distribution
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      responses:
        "200":
          description: Distribution detail
    patch:
      summary: Update a mutable distribution
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AidDistributionRequest"
      responses:
        "200":
          description: Updated distribution
  /aid-distributions/{distribution}/items:
    get:
      summary: List distribution items
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      responses:
        "200":
          description: Distribution item collection
    post:
      summary: Add a distribution item
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributionItemRequest"
      responses:
        "200":
          description: Created distribution item
  /aid-distributions/{distribution}/items/{item}:
    patch:
      summary: Update a distribution item
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
        - $ref: "#/components/parameters/DistributionItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributionItemRequest"
      responses:
        "200":
          description: Updated distribution item
    delete:
      summary: Delete a distribution item
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
        - $ref: "#/components/parameters/DistributionItemId"
      responses:
        "200":
          description: Deleted distribution item
  /aid-distributions/{distribution}/mark-delivered:
    post:
      summary: Mark a distribution delivered and consume reserved stock
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
        - name: Idempotency-Key
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkDeliveredRequest"
      responses:
        "200":
          description: Delivered distribution
  /aid-distributions/{distribution}/mark-failed:
    post:
      summary: Mark a distribution failed and release reserved stock
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkFailedDistributionRequest"
      responses:
        "200":
          description: Failed distribution
  /aid-distributions/{distribution}/reschedule:
    post:
      summary: Reschedule a distribution
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RescheduleDistributionRequest"
      responses:
        "200":
          description: Rescheduled distribution
  /aid-distributions/{distribution}/proof:
    post:
      summary: Attach proof metadata or files to a distribution
      tags: [Aid Distribution]
      parameters:
        - $ref: "#/components/parameters/AidDistributionId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DeliveryProofRequest"
      responses:
        "200":
          description: Proof attached
  /reports/dashboard:
    get:
      summary: Get dashboard metrics and alerts
      tags: [Reports]
      responses:
        "200":
          description: Dashboard metrics
  /reports/donations:
    get:
      summary: Get donation report
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/CampaignFilter"
        - name: payment_method
          in: query
          schema:
            type: string
        - name: donor_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Donation report
  /reports/campaigns:
    get:
      summary: Get campaign report
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/CampaignFilter"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Campaign report
  /reports/beneficiaries:
    get:
      summary: Get beneficiary report
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/BranchFilter"
      responses:
        "200":
          description: Beneficiary report
  /reports/case-files:
    get:
      summary: Get case file report
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/BranchFilter"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Case file report
  /reports/distributions:
    get:
      summary: Get aid distribution report
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
        - $ref: "#/components/parameters/BranchFilter"
        - $ref: "#/components/parameters/CampaignFilter"
        - $ref: "#/components/parameters/Status"
      responses:
        "200":
          description: Distribution report
  /reports/inventory:
    get:
      summary: Get inventory report
      tags: [Reports]
      parameters:
        - name: warehouse_id
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Inventory report
  /reports/audit-logs:
    get:
      summary: Get audit report
      tags: [Reports]
      parameters:
        - $ref: "#/components/parameters/DateFrom"
        - $ref: "#/components/parameters/DateTo"
      responses:
        "200":
          description: Audit report
  /exports:
    get:
      summary: List export records
      tags: [Exports]
      responses:
        "200":
          description: Export collection
    post:
      summary: Create a synchronous CSV export
      tags: [Exports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: Created export record
  /exports/{export}:
    get:
      summary: Get export record
      tags: [Exports]
      parameters:
        - $ref: "#/components/parameters/ExportId"
      responses:
        "200":
          description: Export detail
  /exports/{export}/download:
    get:
      summary: Download completed export file
      tags: [Exports]
      parameters:
        - $ref: "#/components/parameters/ExportId"
      responses:
        "200":
          description: CSV file download
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    Search:
      name: search
      in: query
      schema:
        type: string
    DateFrom:
      name: date_from
      in: query
      schema:
        type: string
        format: date
    DateTo:
      name: date_to
      in: query
      schema:
        type: string
        format: date
    BranchFilter:
      name: branch_id
      in: query
      schema:
        type: integer
    CampaignFilter:
      name: campaign_id
      in: query
      schema:
        type: integer
    Status:
      name: status
      in: query
      schema:
        type: string
    BeneficiaryId:
      name: beneficiary
      in: path
      required: true
      schema:
        type: integer
    CaseFileId:
      name: caseFile
      in: path
      required: true
      schema:
        type: integer
    DonorId:
      name: donor
      in: path
      required: true
      schema:
        type: integer
    CampaignId:
      name: campaign
      in: path
      required: true
      schema:
        type: integer
    DonationId:
      name: donation
      in: path
      required: true
      schema:
        type: integer
    PaymentTransactionId:
      name: paymentTransaction
      in: path
      required: true
      schema:
        type: integer
    WarehouseId:
      name: warehouse
      in: path
      required: true
      schema:
        type: integer
    InventoryItemId:
      name: inventoryItem
      in: path
      required: true
      schema:
        type: integer
    StockLotId:
      name: stockLot
      in: path
      required: true
      schema:
        type: integer
    StockMovementId:
      name: stockMovement
      in: path
      required: true
      schema:
        type: integer
    AidBatchId:
      name: aidBatch
      in: path
      required: true
      schema:
        type: integer
    AidDistributionId:
      name: distribution
      in: path
      required: true
      schema:
        type: integer
    DistributionItemId:
      name: item
      in: path
      required: true
      schema:
        type: integer
    ExportId:
      name: export
      in: path
      required: true
      schema:
        type: integer
    NotificationId:
      name: notification
      in: path
      required: true
      schema:
        type: integer
    PublicCampaignSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@awniq.test
        password:
          type: string
          example: Password123!
        device_name:
          type: string
          example: manual
    BeneficiaryRequest:
      type: object
      required: [branch_id, full_name]
      properties:
        branch_id:
          type: integer
        full_name:
          type: string
        national_id:
          type: string
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [male, female, other, unknown]
        phone:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        household_size:
          type: integer
          minimum: 1
        vulnerability_level:
          type: string
          enum: [low, medium, high, critical]
    FamilyMemberRequest:
      type: object
      required: [full_name, relationship]
      properties:
        full_name:
          type: string
        relationship:
          type: string
        birth_date:
          type: string
          format: date
          nullable: true
        gender:
          type: string
          enum: [male, female, other, unknown]
    CaseFileRequest:
      type: object
      required: [beneficiary_id, case_type]
      properties:
        beneficiary_id:
          type: integer
        case_type:
          type: string
          example: monthly_food_support
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assigned_to_user_id:
          type: integer
          nullable: true
        assessment_summary:
          type: string
          nullable: true
        next_follow_up_date:
          type: string
          format: date
          nullable: true
    CaseNoteRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
        visibility:
          type: string
          enum: [internal, private, public]
    CaseDocumentUploadRequest:
      type: object
      required: [document_type, file]
      properties:
        document_type:
          type: string
          enum: [identity, proof_of_address, medical_report, income_proof, assessment, consent, other]
        file:
          type: string
          format: binary
    DonorRequest:
      type: object
      required: [donor_type, name]
      properties:
        donor_type:
          type: string
          enum: [individual, company, institution, anonymous]
        name:
          type: string
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, blocked]
    CampaignRequest:
      type: object
      required: [title, slug, goal_amount, currency, start_date]
      properties:
        title:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        goal_amount:
          type: number
        currency:
          type: string
          example: EGP
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        visibility:
          type: string
          enum: [private, public]
    DonationAllocationRequest:
      type: object
      required: [allocation_type, amount]
      properties:
        allocation_type:
          type: string
          enum: [general_fund, campaign, beneficiary, case_file, medical, education, food, emergency, inventory, other]
        campaign_id:
          type: integer
          nullable: true
        beneficiary_id:
          type: integer
          nullable: true
        case_file_id:
          type: integer
          nullable: true
        amount:
          type: number
        notes:
          type: string
          nullable: true
    DonationRequest:
      type: object
      required: [amount, currency, payment_method, donated_at]
      properties:
        donor_id:
          type: integer
          nullable: true
        campaign_id:
          type: integer
          nullable: true
        amount:
          type: number
        currency:
          type: string
          example: EGP
        payment_method:
          type: string
          enum: [cash, bank_transfer, card, check, mobile_wallet, other]
        donated_at:
          type: string
          format: date-time
        allocations:
          type: array
          items:
            $ref: "#/components/schemas/DonationAllocationRequest"
    ConfirmDonationRequest:
      type: object
      properties:
        provider:
          type: string
          enum: [manual, fake]
        provider_transaction_id:
          type: string
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
    WarehouseRequest:
      type: object
      required: [name, code]
      properties:
        branch_id:
          type: integer
          nullable: true
        name:
          type: string
        code:
          type: string
          example: CAI-MAIN
        address:
          type: string
          nullable: true
        manager_user_id:
          type: integer
          nullable: true
        status:
          type: string
          enum: [active, inactive]
    InventoryItemRequest:
      type: object
      required: [sku, name, category, unit]
      properties:
        sku:
          type: string
          example: FOOD-RICE-5KG
        name:
          type: string
        category:
          type: string
          example: food
        unit:
          type: string
          example: bag
        description:
          type: string
          nullable: true
        minimum_stock_level:
          type: number
          minimum: 0
        track_expiry:
          type: boolean
        status:
          type: string
          enum: [active, inactive]
    ReceiveStockRequest:
      type: object
      required: [warehouse_id, inventory_item_id, quantity, source_type, received_at]
      properties:
        warehouse_id:
          type: integer
        inventory_item_id:
          type: integer
        quantity:
          type: number
          minimum: 0
        source_type:
          type: string
          enum: [opening_balance, purchase, donation_in_kind, transfer, adjustment, other]
        source_id:
          type: integer
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        received_at:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
    AdjustStockRequest:
      type: object
      required: [warehouse_id, inventory_item_id, movement_type, quantity, notes]
      properties:
        warehouse_id:
          type: integer
        inventory_item_id:
          type: integer
        stock_lot_id:
          type: integer
          nullable: true
        movement_type:
          type: string
          enum: [adjustment_in, adjustment_out, damaged, expired]
        quantity:
          type: number
          minimum: 0
        expiry_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
    AidBatchRequest:
      type: object
      required: [title]
      properties:
        branch_id:
          type: integer
          nullable: true
        warehouse_id:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        campaign_id:
          type: integer
          nullable: true
        scheduled_date:
          type: string
          format: date
          nullable: true
    AidDistributionRequest:
      type: object
      required: [beneficiary_id, delivery_method]
      properties:
        beneficiary_id:
          type: integer
        case_file_id:
          type: integer
          nullable: true
        scheduled_at:
          type: string
          format: date-time
          nullable: true
        delivery_method:
          type: string
          enum: [pickup, home_delivery, field_visit, partner_delivery, other]
        notes:
          type: string
          nullable: true
    DistributionItemRequest:
      type: object
      properties:
        inventory_item_id:
          type: integer
          nullable: true
        stock_lot_id:
          type: integer
          nullable: true
        quantity:
          type: number
          nullable: true
        cash_amount:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
          example: EGP
        notes:
          type: string
          nullable: true
    MarkDeliveredRequest:
      type: object
      required: [proof_type]
      properties:
        proof_type:
          type: string
          enum: [photo, signature, manual, otp, qr]
        otp_code:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    DeliveryProofRequest:
      type: object
      required: [proof_type]
      properties:
        proof_type:
          type: string
          enum: [photo, signature, manual, otp, qr]
        file:
          type: string
          format: binary
          nullable: true
        beneficiary_signature_file:
          type: string
          format: binary
          nullable: true
        otp_code:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    MarkFailedDistributionRequest:
      type: object
      required: [failure_reason]
      properties:
        failure_reason:
          type: string
        notes:
          type: string
          nullable: true
    RescheduleDistributionRequest:
      type: object
      required: [scheduled_at]
      properties:
        scheduled_at:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
    ExportRequest:
      type: object
      required: [report_type]
      properties:
        report_type:
          type: string
          enum: [donations, campaigns, beneficiaries, case_files, distributions, inventory, audit_logs]
        format:
          type: string
          enum: [csv]
          default: csv
        filters:
          type: object
          nullable: true
          properties:
            date_from:
              type: string
              format: date
            date_to:
              type: string
              format: date
            branch_id:
              type: integer
            warehouse_id:
              type: integer
            campaign_id:
              type: integer
            status:
              type: string
            payment_method:
              type: string
            donor_type:
              type: string
            category:
              type: string
    PublicDonationIntentRequest:
      type: object
      required: [amount, currency]
      additionalProperties: false
      properties:
        organization:
          type: string
          nullable: true
          description: Optional organization slug when multiple public organizations exist.
        campaign_slug:
          type: string
          nullable: true
          description: Optional public active campaign slug.
        donor_name:
          type: string
          nullable: true
        donor_email:
          type: string
          format: email
          nullable: true
        amount:
          type: number
          minimum: 1
        currency:
          type: string
          example: EGP
    UpdatePublicPortalSettingsRequest:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        show_donation_totals:
          type: boolean
        show_campaign_progress:
          type: boolean
        show_completed_campaigns:
          type: boolean
        show_contact_info:
          type: boolean
        donations_enabled:
          type: boolean
        reports_enabled:
          type: boolean
        contact_email:
          type: string
          format: email
          nullable: true
        contact_phone:
          type: string
          nullable: true
        about:
          type: string
          nullable: true
    UpdateNotificationPreferencesRequest:
      type: object
      required: [preferences]
      properties:
        preferences:
          type: array
          items:
            type: object
            required: [category]
            properties:
              category:
                type: string
                enum: [cases, finance, inventory, aid_distribution, system]
              database_enabled:
                type: boolean
              email_enabled:
                type: boolean
                description: Stored as false until an email channel is configured.
    RejectionReasonRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
