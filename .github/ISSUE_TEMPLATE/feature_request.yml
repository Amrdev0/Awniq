name: Feature request
description: Suggest a scoped feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem does this solve for an NGO or charity?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Identity and permissions
        - Beneficiaries and cases
        - Donors and donations
        - Inventory
        - Aid distribution
        - Reports and exports
        - Public transparency
        - Notifications and automation
        - Developer experience
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Data and privacy notes
      description: What sensitive data could this touch?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
