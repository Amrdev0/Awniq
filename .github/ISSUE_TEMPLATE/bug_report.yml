name: Bug report
description: Report a reproducible problem in Awniq.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include real beneficiary, donor, receipt, document, token, or production data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, endpoint, role, or screen.
      placeholder: |
        1. Log in as ...
        2. Open ...
        3. Submit ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Admin frontend
        - Public portal
        - Database/migrations
        - Seed data
        - Reports/exports
        - Documentation
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.10.0 or git SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove tokens, secrets, and private personal data before attaching.
