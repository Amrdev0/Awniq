name: Documentation issue
description: Report missing, unclear, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link or name the file/section.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is missing, outdated, or confusing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
