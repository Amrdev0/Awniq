name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api:
    name: API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, pdo_pgsql, redis, yaml
          coverage: none

      - name: Install Composer dependencies
        working-directory: apps/api
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        working-directory: apps/api
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate --force

      - name: Verify migrations and seeders
        working-directory: apps/api
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan migrate:fresh --seed --force --no-interaction

      - name: Run Pint
        working-directory: apps/api
        run: composer lint

      - name: Run API tests
        working-directory: apps/api
        run: composer test

      - name: Validate OpenAPI YAML
        working-directory: apps/api
        run: php -r "if (! is_array(yaml_parse_file('../../openapi/openapi.yaml'))) { fwrite(STDERR, 'Invalid OpenAPI YAML'.PHP_EOL); exit(1); }"

  admin:
    name: Admin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install npm dependencies
        working-directory: apps/admin
        run: npm ci

      - name: Run frontend lint
        working-directory: apps/admin
        run: npm run lint

      - name: Run frontend tests
        working-directory: apps/admin
        run: npm run test

      - name: Build frontend
        working-directory: apps/admin
        run: npm run build
